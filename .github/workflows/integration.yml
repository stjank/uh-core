name: Integration Test (C++ Apps)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  integration-test-docker:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:

    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT }}
        submodules: recursive

    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: plauth
        password: ${{ secrets.PAT }}

    - name: Pull build base image
      run: docker pull ghcr.io/ultihash/build-base:latest

    - name: Build and bring up containers
      run: docker-compose -f docker-compose-integration.yml up -d --build

    - name: Wait for integration test to complete
      run: ./wait_for_benchmark.py

    - name: Validate integration test output
      env:
        RUN_AS_ACTION: 1
      run: ./integration.sh
