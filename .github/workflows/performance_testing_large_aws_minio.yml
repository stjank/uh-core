name: Large-Sized Performance Testing AWS (MinIO)

on:
  workflow_dispatch:

env:
  ENVIRONMENT_NAME: performance-testing-large-minio-amd64

jobs:

  deploy-and-test:
    runs-on: lightweight-generic-jobs
    steps:

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
          submodules: recursive
      
      - name: Install AWS CLI
        uses: unfor19/install-aws-cli-action@v1
        with:
          version: 2
          arch: arm64

      - name: Setup the AWS credentials
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY}}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_KEY}}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=eu-central-1" >> $GITHUB_ENV

      - uses: azure/setup-kubectl@v4

      - name: Download Kubeconfig
        run: |
          mkdir ~/.kube
          aws eks update-kubeconfig --name aws-core
    
      - uses: azure/setup-helm@v4.3.0

      - name: Delete the testing environment if exists
        run: |
          helm uninstall minio -n ${{ env.ENVIRONMENT_NAME }} --wait || true
          kubectl delete pods --all --force -n ${{ env.ENVIRONMENT_NAME }} || true
          kubectl delete pvc --all -n ${{ env.ENVIRONMENT_NAME }} || true
          kubectl delete secrets --all -n ${{ env.ENVIRONMENT_NAME }} || true
          kubectl delete ns ${{ env.ENVIRONMENT_NAME }} || true
        continue-on-error: true
      
      - name: Provision the testing environment
        run: |
          kubectl create ns ${{ env.ENVIRONMENT_NAME }}
          kubectl create secret docker-registry registry-credentials -n ${{ env.ENVIRONMENT_NAME }} --docker-server='${{ vars.DOCKER_REGISTRY }}' --docker-username='${{ secrets.DOCKER_REGISTRY_USERNAME }}' --docker-password='${{ secrets.DOCKER_REGISTRY_PASSWORD }}'

      - name: Generate the performance tester manifest for Minio
        uses: danielr1996/envsubst-action@1.1.0
        env:
          TEST_NAME: "large_performance_test_minio"
          AMOUNT_GiB: "100"
          PROM_URL: "prometheus-prometheus-pushgateway.monitoring.svc.cluster.local:9091"
          TEST_TYPE: MINIO
          S3_ENDPOINT_URL: "http://minio:9000"
          S3_SOURCE_BUCKET: test
          S3_DESTINATION_BUCKET: test
          AWS_ACCESS_KEY_ID: admin
          AWS_SECRET_ACCESS_KEY: testpassword
          MULTIPART_CHUNK_SIZE: "67108864"  # 64 MB
          READ_TIMEOUT: "600"
          JOBS: "10"
        with:
          input: testing/performance/large/performance-tester-minio.yaml
          output: performance-tester-minio.yaml

      - name: Install the MinIO cluster
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update bitnami
          helm install minio bitnami/minio -n ${{ env.ENVIRONMENT_NAME }} --values testing/performance/large/minio-helm-values.yaml --version 14.6.22 --wait --timeout 15m

      - name: Execute the performance test against MinIO
        run: |
          bash testing/performance/execute_job.sh performance-tester-minio.yaml performance-tester ${{ env.ENVIRONMENT_NAME }} 1h
 
  cleanup:
    runs-on: lightweight-generic-jobs
    needs: deploy-and-test
    if: ${{ always() }}
    steps:

      - name: Install AWS CLI
        uses: unfor19/install-aws-cli-action@v1
        with:
          version: 2
          arch: arm64

      - name: Setup the AWS credentials
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY}}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_KEY}}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=eu-central-1" >> $GITHUB_ENV

      - uses: azure/setup-kubectl@v4

      - name: Download Kubeconfig
        run: |
          mkdir ~/.kube
          aws eks update-kubeconfig --name aws-core
    
      - uses: azure/setup-helm@v4.3.0

      - name: Environment cleanup
        run: |
          helm uninstall minio -n ${{ env.ENVIRONMENT_NAME }} --wait || true
          kubectl delete pods --all --force -n ${{ env.ENVIRONMENT_NAME }} || true
          kubectl delete pvc --all -n ${{ env.ENVIRONMENT_NAME }} || true
          kubectl delete secrets --all -n ${{ env.ENVIRONMENT_NAME }} || true
          kubectl delete ns ${{ env.ENVIRONMENT_NAME }} || true
        continue-on-error: true
      