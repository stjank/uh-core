name: Unit Tests (Linux, GCC)

on:
  push:
    branches: [ "master", "no-mpi" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  unit-test-linux-gcc:
    strategy:
      matrix:
        build: [Release, Debug]
        os: [uh-x86_64-ubuntu-20.04, uh-x86_64-ubuntu-22.04, uh-aarch64-ubuntu-22.04]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
          submodules: recursive

      - name: Configure CMake
        # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
        # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{ matrix.build }} -DCPACK_COMPONENTS_ALL="uh-cluster;uh-data-node;uh-cli"

      - name: Build
        # Build your program with the given configuration
        run: cmake --build ${{github.workspace}}/build --config ${{ matrix.build }} --parallel $(nproc)

      - name: Test
        env:
          MALLOC_CHECK_: 2
          LD_LIBRARY_PATH: /usr/local/lib
        working-directory: ${{github.workspace}}/build
        # Execute tests defined by the CMake configuration.
        # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
        run: ctest -C ${{ matrix.build }} --output-on-failure

      - name: Packaging (.deb)
        working-directory: ${{github.workspace}}/build
        if: matrix.build == 'Release'
        run: cpack -G DEB

      - name: Upload uh-cli
        uses: actions/upload-artifact@v3
        if: matrix.build == 'Release' && matrix.os == 'uh-x86_64-ubuntu-22.04'
        with:
          name: ultihash-cli_${{ github.sha }}_amd64.deb
          path: ${{github.workspace}}/packaging/ultihash-cli_0.2.0_amd64.deb

      - name: Upload uh-data-node
        uses: actions/upload-artifact@v3
        if: matrix.build == 'Release' && matrix.os == 'uh-x86_64-ubuntu-22.04'
        with:
          name: ultihash-data-node_${{ github.sha }}_amd64.deb
          path: ${{github.workspace}}/packaging/ultihash-data-node_0.2.0_amd64.deb

      - name: Upload uh-cluster
        uses: actions/upload-artifact@v3
        if: matrix.build == 'Release' && matrix.os == 'uh-x86_64-ubuntu-22.04'
        with:
          name: ultihash-cluster_${{ github.sha }}_amd64.deb
          path: ${{github.workspace}}/packaging/ultihash-cluster_0.2.0_amd64.deb

