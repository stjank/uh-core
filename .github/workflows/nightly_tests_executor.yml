name: Nightly Testing Workflow

on:
  schedule:
    - cron: '0 0 * * MON-FRI'
  workflow_dispatch:
    inputs:
      test-to-execute:
        type: choice
        description: Choose the test to execute
        options: 
          - feature-test
          - proxy-stability-test
          - pyspark-test
          - s3a-test
          - stability-test
          - small-performance-test
          - vulnerability-scanning
          - all
        required: true

jobs:

  build-core:
    uses: ./.github/workflows/docker_build_template.yml 
    with:
      docker_context: .
      dockerfile_path: Dockerfile
      docker_build_args: |
        BuildType=RelWithDebInfo
        DebugTools=True
      docker_images: registry.ultihash.io/dev/core
      docker_tags: nightly-build
      platforms: linux/arm64
    secrets:
      ghcr_token: ${{ secrets.PAT }}
      registry_token: ${{ secrets.REGISTRY_USER }}
    
  build-database-init:
    uses: ./.github/workflows/docker_build_template.yml
    needs:
      - build-core
    with:
      docker_context: .
      dockerfile_path: tools/database-init/Dockerfile
      docker_images: registry.ultihash.io/dev/database-init
      docker_tags: nightly-build
      platforms: linux/arm64
    secrets:
      ghcr_token: ${{ secrets.PAT }}
      registry_token: ${{ secrets.REGISTRY_USER }}

  feature-test-rr:
    needs: 
      - build-core
      - build-database-init
    if: |
      github.event_name == 'schedule' || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'feature-test') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'pyspark-test') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 's3a-test') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'all')
    uses: ./.github/workflows/feature_testing_nightly.yml
    with:
      env_name: feature-testing-rr
      docker_image_tag: nightly-build
      docker_registry: ${{ vars.DOCKER_REGISTRY }}
      helm_values: testing/feature/helm-values-rr.yaml
    secrets:
      ghcr_token: ${{ secrets.PAT }}
      docker_registry_username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
      docker_registry_password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
      registry_token: ${{ secrets.REGISTRY_USER }}
      aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY}}
      aws_secret_access_key: ${{ secrets.AWS_SECRET_KEY}}
      uh_license: ${{ secrets.UH_LICENSE_JSON }}
      monitoring_token: ${{ secrets.MONITORING_TOKEN_AWS }}

  feature-test-ec:
    needs: 
      - build-core
      - build-database-init
      - feature-test-rr
    if: |
      github.event_name == 'schedule' || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'feature-test') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'pyspark-test') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 's3a-test') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'all')
    uses: ./.github/workflows/feature_testing_nightly.yml
    with:
      env_name: feature-testing-ec
      docker_image_tag: nightly-build
      docker_registry: ${{ vars.DOCKER_REGISTRY }}
      helm_values: testing/feature/helm-values-ec.yaml
    secrets:
      ghcr_token: ${{ secrets.PAT }}
      docker_registry_username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
      docker_registry_password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
      registry_token: ${{ secrets.REGISTRY_USER }}
      aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY}}
      aws_secret_access_key: ${{ secrets.AWS_SECRET_KEY}}
      uh_license: ${{ secrets.UH_LICENSE_JSON }}
      monitoring_token: ${{ secrets.MONITORING_TOKEN_AWS }}

  proxy-stability-test:
    needs:
      - build-core
      - build-database-init
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'proxy-stability-test')
    uses: ./.github/workflows/proxy_stability_testing.yml
    with:
      env_name: proxy-stability-testing
      docker_image_tag: nightly-build
      docker_registry: ${{ vars.DOCKER_REGISTRY }}
      helm_values: testing/proxy-stability/helm-values.yaml
    secrets:
      ghcr_token: ${{ secrets.PAT }}
      docker_registry_username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
      docker_registry_password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
      registry_token: ${{ secrets.REGISTRY_USER }}
      aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY}}
      aws_secret_access_key: ${{ secrets.AWS_SECRET_KEY}}
      uh_license: ${{ secrets.UH_LICENSE_JSON }}
      monitoring_token: ${{ secrets.MONITORING_TOKEN_ON_PREMISE }}

  pyspark-test-rr:
    needs: 
      - build-core
      - build-database-init
      - feature-test-ec
    if: |
      github.event_name == 'schedule' || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'pyspark-test') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 's3a-test') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'all')
    uses: ./.github/workflows/pyspark_testing.yml
    with:
      env_name: pyspark-testing-rr
      docker_image_tag: nightly-build
      docker_registry: ${{ vars.DOCKER_REGISTRY }}
      helm_values: testing/pyspark/helm-values-rr.yaml
    secrets:
      ghcr_token: ${{ secrets.PAT }}
      docker_registry_username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
      docker_registry_password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
      registry_token: ${{ secrets.REGISTRY_USER }}
      aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY}}
      aws_secret_access_key: ${{ secrets.AWS_SECRET_KEY}}
      uh_license: ${{ secrets.UH_LICENSE_JSON }}
      monitoring_token: ${{ secrets.MONITORING_TOKEN_ON_PREMISE }}

  pyspark-test-ec:
    needs:
      - build-core
      - build-database-init
      - pyspark-test-rr
    if: |
      github.event_name == 'schedule' || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'pyspark-test') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 's3a-test') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'all')
    uses: ./.github/workflows/pyspark_testing.yml
    with:
      env_name: pyspark-testing-ec
      docker_image_tag: nightly-build
      docker_registry: ${{ vars.DOCKER_REGISTRY }}
      helm_values: testing/pyspark/helm-values-ec.yaml
    secrets:
      ghcr_token: ${{ secrets.PAT }}
      docker_registry_username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
      docker_registry_password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
      registry_token: ${{ secrets.REGISTRY_USER }}
      aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY}}
      aws_secret_access_key: ${{ secrets.AWS_SECRET_KEY}}
      uh_license: ${{ secrets.UH_LICENSE_JSON }}
      monitoring_token: ${{ secrets.MONITORING_TOKEN_ON_PREMISE }}

  s3a-test-rr:
    needs: 
      - build-core
      - build-database-init
      - pyspark-test-ec
    if: |
      github.event_name == 'schedule' || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 's3a-test') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'all')
    uses: ./.github/workflows/s3a_testing.yml
    with:
      env_name: s3a-testing-rr
      docker_image_tag: nightly-build
      docker_registry: ${{ vars.DOCKER_REGISTRY }}
      helm_values: testing/s3a/helm-values-rr.yaml
    secrets:
      ghcr_token: ${{ secrets.PAT }}
      docker_registry_username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
      docker_registry_password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
      registry_token: ${{ secrets.REGISTRY_USER }}
      aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY}}
      aws_secret_access_key: ${{ secrets.AWS_SECRET_KEY}}
      uh_license: ${{ secrets.UH_LICENSE_JSON }}
      monitoring_token: ${{ secrets.MONITORING_TOKEN_ON_PREMISE }}

  s3a-test-ec:
    needs:
      - build-core
      - build-database-init
      - s3a-test-rr
    if: |
      github.event_name == 'schedule' || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 's3a-test') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'all')
    uses: ./.github/workflows/s3a_testing.yml
    with:
      env_name: s3a-testing-ec
      docker_image_tag: nightly-build
      docker_registry: ${{ vars.DOCKER_REGISTRY }}
      helm_values: testing/s3a/helm-values-ec.yaml
    secrets:
      ghcr_token: ${{ secrets.PAT }}
      docker_registry_username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
      docker_registry_password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
      registry_token: ${{ secrets.REGISTRY_USER }}
      aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY}}
      aws_secret_access_key: ${{ secrets.AWS_SECRET_KEY}}
      uh_license: ${{ secrets.UH_LICENSE_JSON }}
      monitoring_token: ${{ secrets.MONITORING_TOKEN_ON_PREMISE }}

  stability-test-rr:
    needs: 
      - build-core
      - build-database-init
    if: |
      github.event_name == 'schedule' || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'stability-test') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'all')
    uses: ./.github/workflows/stability_testing.yml
    with:
      env_name: stability-testing-rr
      docker_image_tag: nightly-build
      docker_registry: ${{ vars.DOCKER_REGISTRY }}
      helm_values: testing/stability/helm-values-rr.yaml
    secrets:
      ghcr_token: ${{ secrets.PAT }}
      docker_registry_username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
      docker_registry_password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
      registry_token: ${{ secrets.REGISTRY_USER }}
      aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY}}
      aws_secret_access_key: ${{ secrets.AWS_SECRET_KEY}}
      uh_license: ${{ secrets.UH_LICENSE_JSON }}
      monitoring_token: ${{ secrets.MONITORING_TOKEN_ON_PREMISE }}

  stability-test-cooldown:
    runs-on: lightweight-generic-jobs
    needs:
      - stability-test-rr
    if: |
      github.event_name == 'schedule' || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'stability-test') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'all')

    steps:
      - name: Sleep for 5 minutes
        run: sleep 300s
        shell: bash

  stability-test-ec:
    needs: 
      - build-core
      - build-database-init
      - stability-test-cooldown
    if: |
      github.event_name == 'schedule' || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'stability-test') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'all')
    uses: ./.github/workflows/stability_testing.yml
    with:
      env_name: stability-testing-ec
      docker_image_tag: nightly-build
      docker_registry: ${{ vars.DOCKER_REGISTRY }}
      helm_values: testing/stability/helm-values-ec.yaml
    secrets:
      ghcr_token: ${{ secrets.PAT }}
      docker_registry_username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
      docker_registry_password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
      registry_token: ${{ secrets.REGISTRY_USER }}
      aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY}}
      aws_secret_access_key: ${{ secrets.AWS_SECRET_KEY}}
      uh_license: ${{ secrets.UH_LICENSE_JSON }}
      monitoring_token: ${{ secrets.MONITORING_TOKEN_ON_PREMISE }}
  
  small-performance-test-rr:
    needs: 
      - build-core
      - build-database-init
    if: |
      github.event_name == 'schedule' || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'small-performance-test') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'all')
    uses: ./.github/workflows/performance_testing_small.yml
    with:
      env_name: performance-testing-small-rr
      docker_image_tag: nightly-build
      docker_registry: ${{ vars.DOCKER_REGISTRY }}
      helm_values: testing/performance/small/ultihash-helm-values-rr.yaml
      storage_group_type: rr
    secrets:
      ghcr_token: ${{ secrets.PAT }}
      docker_registry_username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
      docker_registry_password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
      registry_token: ${{ secrets.REGISTRY_USER }}
      aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY}}
      aws_secret_access_key: ${{ secrets.AWS_SECRET_KEY}}
      uh_license: ${{ secrets.UH_LICENSE_JSON }}
      monitoring_token: ${{ secrets.MONITORING_TOKEN_AWS }}

  small-performance-test-cooldown:
    runs-on: lightweight-generic-jobs
    needs:
      - small-performance-test-rr
    if: |
      github.event_name == 'schedule' || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'small-performance-test') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'all')

    steps:
      - name: Sleep for 5 minutes
        run: sleep 300s
        shell: bash
      

  small-performance-test-ec:
    needs: 
      - build-core
      - build-database-init
      - small-performance-test-cooldown
    if: |
      github.event_name == 'schedule' || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'small-performance-test') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'all')

    uses: ./.github/workflows/performance_testing_small.yml
    with:
      env_name: performance-testing-small-ec
      docker_image_tag: nightly-build
      docker_registry: ${{ vars.DOCKER_REGISTRY }}
      helm_values: testing/performance/small/ultihash-helm-values-ec.yaml
      storage_group_type: ec
    secrets:
      ghcr_token: ${{ secrets.PAT }}
      docker_registry_username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
      docker_registry_password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
      registry_token: ${{ secrets.REGISTRY_USER }}
      aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY}}
      aws_secret_access_key: ${{ secrets.AWS_SECRET_KEY}}
      uh_license: ${{ secrets.UH_LICENSE_JSON }}
      monitoring_token: ${{ secrets.MONITORING_TOKEN_AWS }}

  vulnerability-scanning:
    needs: 
      - build-core
    if: |
      github.event_name == 'schedule' || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'vulnerability-scanning') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.test-to-execute == 'all')
    uses: ./.github/workflows/vulnerability_scanning.yml
    with:
      docker_image_tag: nightly-build
    secrets:
      registry_token: ${{ secrets.REGISTRY_USER }}
      ghcr_token: ${{ secrets.PAT }}
