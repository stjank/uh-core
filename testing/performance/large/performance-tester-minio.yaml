apiVersion: v1
kind: Pod
metadata:
  name: performance-tester
spec:
  restartPolicy: Never
  imagePullSecrets:
    - name: registry-credentials
  nodeSelector:
    workload-type: tester
    purpose:  performance-testing-large
  tolerations:
    - key: "purpose"
      operator: "Equal"
      value: "testing"
      effect: "NoSchedule"
  containers:
    - name: performance-tester
      image: registry.ultihash.io/dev/core-performance-test:latest
      imagePullPolicy: Always
      env:
        - name: TEST_TYPE
          value: $TEST_TYPE
        - name: AMOUNT_GiB
          value: "$AMOUNT_GiB"
        - name: S3_ENDPOINT_URL
          value: "$S3_ENDPOINT_URL"
        - name: S3_SOURCE_BUCKET
          value: $S3_SOURCE_BUCKET
        - name: S3_DESTINATION_BUCKET
          value: "$S3_DESTINATION_BUCKET"
        - name: READ_TIMEOUT
          value: "$READ_TIMEOUT"
        - name: JOBS
          value: "$JOBS"
        - name: MULTIPART_CHUNK_SIZE
          value: "$MULTIPART_CHUNK_SIZE"
        - name: TEST_NAME
          value: "$TEST_NAME"
        - name: PROM_URL
          value: "$PROM_URL"
        - name: AWS_ACCESS_KEY_ID
          value: "$AWS_ACCESS_KEY_ID"
        - name: AWS_SECRET_ACCESS_KEY
          value: "$AWS_SECRET_ACCESS_KEY"