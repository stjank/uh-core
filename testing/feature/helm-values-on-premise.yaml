global:
  image: $CORE_IMAGE
  imagePullPolicy: Always
  imagePullSecrets:
  - registry-credentials
  logLevel: DEBUG
  telemetryExportInterval: 30000
  ultihashSecret:
    key: license
    name: ultihash
  securityContext:
    capabilities:
      add:
      - SYS_PTRACE
  policies: |
    {
      "Version": "2012-10-17",
      "Statement": {
         "Sid":  "AllowAllForAnybody",
         "Effect": "Allow",
         "Action": "*",
         "Principal": "*",
         "Resource": "*"
       }
    }

featureTests:
  nodeSelector:
    kubernetes.io/hostname: $KUBERNETES_NODE

etcd:
  replicaCount: 1
  nodeSelector:
    kubernetes.io/hostname: $KUBERNETES_NODE
  persistence:
    size: 5Gi
    storageClass: local-path

coordinator:
  nodeSelector:
    kubernetes.io/hostname: $KUBERNETES_NODE
  extraEnv:
    - name: UH_LICENSE_JSON
      valueFrom:
        secretKeyRef:  
          name: ultihash
          key: new_license

entrypoint:
  replicas: 1
  nodeSelector:
    kubernetes.io/hostname: $KUBERNETES_NODE
  extraEnv:
    - name: UH_LICENSE_JSON
      valueFrom:
        secretKeyRef:  
          name: ultihash
          key: new_license
  
  ingress:
    enabled: false

deduplicator:
  replicas: 1
  storageClass: local-path
  storageSize: 2Gi
  nodeSelector:
    kubernetes.io/hostname: $KUBERNETES_NODE
  extraEnv:
    - name: UH_LICENSE_JSON
      valueFrom:
        secretKeyRef:  
          name: ultihash
          key: new_license

database:
  primary:
    nodeSelector:
      kubernetes.io/hostname: $KUBERNETES_NODE

    persistence:
      storageClass: local-path
      size: 2Gi

databaseInit:
  image: $DATABASE_INIT_IMAGE
  nodeSelector:
    kubernetes.io/hostname: $KUBERNETES_NODE

storage:
  replicas: 1
  storageClass: local-path
  storageSize: 5Gi
  nodeSelector:
    kubernetes.io/hostname: $KUBERNETES_NODE
  extraEnv:
    - name: UH_LICENSE_JSON
      valueFrom:
        secretKeyRef:  
          name: ultihash
          key: new_license

collector:
  config:
    exporters:
      otlphttp/uptrace:
        endpoint: http://opm-k8s-worker-04.ultihash.io
        headers:
          uptrace-dsn: http://${env:UH_EXPORTER_TOKEN}@opm-k8s-worker-04.ultihash.io
    receivers:
      kubeletstats: null
      prometheus: null
    service:
      pipelines:
        metrics:
          receivers:
          - otlp
  extraEnvs:
  - name: UH_POD_IP
    valueFrom:
      fieldRef:
        fieldPath: status.podIP
  - name: UH_NODE_IP
    valueFrom:
      fieldRef:
        fieldPath: status.hostIP
  - name: UH_EXPORTER_TOKEN 
    valueFrom:
      secretKeyRef:
        name: ultihash
        key: token
  nodeSelector:
    kubernetes.io/hostname: $KUBERNETES_NODE
  presets:
    kubeletMetrics:
      enabled: false

exporter:
  enabled: false