name: Docker Image CI

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: plauth
        password: ${{ secrets.PAT }}
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag ghcr.io/ultihash/server-agency:$(printf '%(%Y%m%d)T' -1)
    - name: Push the Docker image
      run: docker push ghcr.io/ultihash/server-agency:$(printf '%(%Y%m%d)T' -1)
